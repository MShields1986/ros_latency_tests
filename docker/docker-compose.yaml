name: latency_tests

services:
  latency:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
    network_mode: host
    ipc: host
    shm_size: "1gb"
    environment:
      - DISPLAY
    volumes:
      - /dev:/dev
      - ../src:/catkin_ws/src
      - ../data:/data
    # Override at `docker compose run latency <cmd>` to change knobs.
    command: >
      python3 /catkin_ws/src/latency_tests/launch/latency_pipeline.py

  # Standalone plotter — reads CSVs and emits PNG violin plots.
  plot:
    build:
      context: ..
      dockerfile: docker/plot.Dockerfile
    volumes:
      - ../scripts:/work/scripts:ro
      - ../data:/data
